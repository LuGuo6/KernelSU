# autorun.conf - 指定每个文件的目标路径和权限
# 格式: <源文件名> <目标路径> <权限>
# 
# 示例:
# autorun /data/adb/微微微/autorun 0755
# Autorun_HTML.zip /data/adb/微微微/Autorun_HTML/Autorun_HTML.zip 0644
# script.sh /data/adb/微微微/scripts/script.sh 0755

# 当前配置
# autorun /data/adb/微微微/autorun 0755
# Autorun_HTML.zip /data/adb/微微微/Autorun_HTML/Autorun_HTML.zip 0644
# .feature_config /data/adb/ksu/.feature_config 0700
